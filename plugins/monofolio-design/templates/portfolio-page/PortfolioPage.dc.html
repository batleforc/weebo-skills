<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Portfolio Page" description="On-brand Monofolio hero + projects starter — dark cyberpunk, crimson glow, sharp 2px corners." -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
</helmet>
<div style="min-height:100vh; background-color:var(--background); color:var(--foreground); font-family:var(--font-sans);">

  <!-- Sticky header -->
  <header style="position:sticky; top:0; z-index:50; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 var(--space-5); border-bottom:1px solid var(--border); background:oklch(0.07 0.018 18 / 0.9); backdrop-filter:blur(12px);">
    <span style="font-family:var(--font-mono); font-weight:700; font-size:1.125rem; color:var(--primary); text-shadow:var(--cyber-glow);">Max.</span>
    <nav style="display:flex; gap:var(--space-6); font-size:var(--text-sm); font-weight:500; color:var(--muted-foreground); font-family:var(--font-sans);">
      <a href="#about" style="color:inherit;">About</a>
      <a href="#projects" style="color:inherit;">Projects</a>
      <a href="#contact" style="color:inherit;">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="cyber-grid-bg" style="position:relative; padding:var(--space-16) var(--space-5); overflow:hidden;">
    <div style="position:absolute; inset:0; background:radial-gradient(ellipse 70% 60% at 70% 30%, oklch(0.65 0.26 25 / 0.14), transparent); pointer-events:none;"></div>
    <div style="position:relative; max-width:var(--container); margin:0 auto;">
      <p style="font-family:var(--font-mono); font-size:var(--text-2xs); font-weight:600; text-transform:uppercase; letter-spacing:0.15em; color:var(--accent); margin:0 0 var(--space-4);">Hello 👋</p>
      <h1 class="glitch" style="font-family:var(--font-sans); font-size:var(--text-hero); font-weight:800; letter-spacing:-0.04em; line-height:1.05; margin:0; background:linear-gradient(to bottom right, var(--foreground), var(--primary)); -webkit-background-clip:text; background-clip:text; color:transparent;">Maxime Leriche</h1>
      <p style="font-family:var(--font-mono); font-size:var(--text-h2); font-weight:500; color:var(--muted-foreground); margin:var(--space-4) 0 0;">Dev, Ops, Arch &amp; Passionate</p>
      <div style="display:flex; gap:var(--space-3); margin-top:var(--space-8);">
        <a href="#about" style="display:inline-flex; align-items:center; font-family:var(--font-mono); font-size:var(--text-sm); font-weight:600; padding:0.6rem 1.1rem; border-radius:var(--radius); background:var(--primary); color:var(--primary-foreground); box-shadow:var(--cyber-glow); transition:transform 0.15s ease;" style-hover="transform:translateY(-1px);">More about me</a>
        <a href="#contact" style="display:inline-flex; align-items:center; font-family:var(--font-mono); font-size:var(--text-sm); font-weight:600; padding:0.6rem 1.1rem; border-radius:var(--radius); background:transparent; color:var(--primary); border:1px solid oklch(0.65 0.26 25 / 0.5);" style-hover="background:oklch(0.65 0.26 25 / 0.1);">Contact me</a>
      </div>
    </div>
  </section>

  <!-- Projects -->
  <section id="projects" style="max-width:var(--container); margin:0 auto; padding:var(--space-16) var(--space-5);">
    <h2 style="font-family:var(--font-mono); font-size:var(--text-h2); font-weight:700; letter-spacing:-0.025em; text-shadow:var(--cyber-glow); margin:0 0 var(--space-2);">Last projects</h2>
    <div style="width:40px; height:2px; background:var(--primary); box-shadow:var(--cyber-glow); margin-bottom:var(--space-8);"></div>
    <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:var(--space-4);">
      <sc-for list="{{ projects }}" as="p" hint-placeholder-count="4">
        <article style="background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:var(--space-6); transition:border-color 0.15s ease;" style-hover="border-color:oklch(0.65 0.26 25 / 0.4);">
          <p style="font-family:var(--font-mono); font-size:var(--text-2xs); font-weight:600; text-transform:uppercase; letter-spacing:0.15em; color:var(--accent); margin:0 0 var(--space-3);">{{ p.tag }}</p>
          <h3 style="font-family:var(--font-sans); font-size:var(--text-h3); font-weight:700; line-height:1.3; margin:0 0 var(--space-2);">{{ p.title }}</h3>
          <p style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--muted-foreground); line-height:1.7; margin:0;">{{ p.desc }}</p>
        </article>
      </sc-for>
    </div>
  </section>

  <!-- Footer -->
  <footer id="contact" class="cyber-grid-bg" style="border-top:1px solid var(--border); padding:var(--space-16) var(--space-5);">
    <div style="max-width:var(--container); margin:0 auto;">
      <h2 style="font-family:var(--font-sans); font-size:var(--text-h1); font-weight:800; letter-spacing:-0.04em; margin:0 0 var(--space-4);">Let's build something useful.</h2>
      <p style="font-family:var(--font-mono); font-size:var(--text-sm); color:var(--muted-foreground); margin:0;">Made with ❤️ and too much coffee ☕.</p>
    </div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:900},&quot;projects&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{tag:string,title:string,desc:string}[]&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const fallback = [
      { tag: "Rust · Leptos", title: "Monofolio V2", desc: "SSR portfolio rebuilt in Rust, hydrated to WASM. Performance, SEO and personality." },
      { tag: "Kubernetes · GitOps", title: "Platform Stack", desc: "Self-hosted cluster running the whole homelab, declared end-to-end with GitOps." },
      { tag: "DevOps", title: "CI Pipelines", desc: "Reproducible build + test pipelines. I want the code fully tested." },
      { tag: "Open Source", title: "Rust/UI Contrib", desc: "Shadcn-style component primitives for Leptos." }
    ];
    return { projects: this.props.projects ?? fallback };
  }
}
</script>
</body>
</html>
