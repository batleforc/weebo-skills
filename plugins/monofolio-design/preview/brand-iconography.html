<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body { margin:0; }
  .wrap { padding:24px 28px; }
  .lbl { font-family:var(--font-mono); font-size:9.5px; color:var(--muted-foreground); letter-spacing:.12em; text-transform:uppercase; margin-bottom:12px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .ic { width:38px; height:38px; border:1px solid var(--border); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--primary); }
  .ic svg { width:18px; height:18px; }
  .ic.sprite svg { width:18px; height:18px; fill:var(--accent); }
  .ic.brand svg { width:18px; height:18px; fill:var(--primary); }
  .emoji { font-size:18px; line-height:38px; }
</style>
</head>
<body>
<div class="wrap">

    <div class="ic"><i data-lucide="graduation-cap"></i></div>
    <div class="ic"><i data-lucide="wrench"></i></div>
    <div class="ic"><i data-lucide="mail"></i></div>

</body>
</html>
