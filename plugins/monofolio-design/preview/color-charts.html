<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:22px 24px; font-family:var(--font-mono); }
  .row { display:flex; gap:12px; }
  .sw { flex:1; height:84px; border-radius:var(--radius-lg); display:flex; flex-direction:column; justify-content:flex-end; padding:9px; box-sizing:border-box; }
  .name { font-size:11px; font-weight:600; color:#fff; }
  .val { font-size:9px; opacity:.75; color:#fff; }
  .lbl { font-size:10px; color:var(--muted-foreground); margin-bottom:10px; letter-spacing:.12em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="lbl">Chart palette — cyber-neon spectrum, red-anchored</div>
  <div class="row">
    <div class="sw" style="background:var(--chart-1);"><div class="name">chart-1</div><div class="val">crimson</div></div>
    <div class="sw" style="background:var(--chart-2);"><div class="name" style="color:#1a0e00">chart-2</div><div class="val" style="color:#1a0e00">copper</div></div>
    <div class="sw" style="background:var(--chart-3);"><div class="name">chart-3</div><div class="val">magenta</div></div>
    <div class="sw" style="background:var(--chart-4);"><div class="name" style="color:#04140c">chart-4</div><div class="val" style="color:#04140c">green</div></div>
    <div class="sw" style="background:var(--chart-5);"><div class="name" style="color:#04140c">chart-5</div><div class="val" style="color:#04140c">cyan</div></div>
  </div>
</div>
</body>
</html>
