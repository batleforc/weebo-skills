<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .stage { position:relative; height:200px; overflow:hidden; }
  .stage img { width:100%; height:100%; object-fit:cover; display:block; }
  .grad { position:absolute; inset:0; background:linear-gradient(to top, var(--background) 4%, transparent 60%); }
  .lbl { position:absolute; left:24px; bottom:16px; font-family:var(--font-mono); font-size:11px; color:var(--foreground); letter-spacing:.06em; }
  .lbl span { display:block; color:var(--muted-foreground); font-size:9.5px; margin-top:3px; }
</style>
</head>
<body>
<div class="stage">
  <img src="../assets/hero-city.png" alt="cyberpunk cityscape">
  <div class="grad"></div>
  <div class="lbl">hero-city.png — full-bleed hero imagery
    <span>Imagery skews hot-pink / magenta; a complementary pop against the crimson + copper UI</span>
  </div>
</div>
</body>
</html>
