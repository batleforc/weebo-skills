<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:24px 28px; }
  .card { max-width:380px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
  .date { font-family:var(--font-mono); font-size:10px; color:var(--accent); letter-spacing:.13em; text-transform:uppercase; font-weight:600; }
  .h { font-family:var(--font-sans); font-weight:700; font-size:16px; color:var(--foreground); margin:5px 0 6px; }
  .p { font-family:var(--font-sans); font-size:12.5px; color:var(--muted-foreground); margin:0 0 14px; line-height:1.6; }
  .row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .tech { padding:2px 9px; border-radius:var(--radius); border:1px solid var(--border); font-size:10px; color:var(--muted-foreground); font-family:var(--font-sans); }
  .hash { padding:2px 9px; border-radius:var(--radius); border:1px solid oklch(0.65 0.26 25 / 0.3); font-size:10px; color:var(--primary); font-family:var(--font-sans); }
  .foot { display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:11px; }
  .handle { font-family:var(--font-mono); font-size:10.5px; color:var(--muted-foreground); }
  .open { font-family:var(--font-sans); font-size:12.5px; color:var(--primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="date">Released · Feb 2025</div>
    <div class="h">ArgoCD on OVHcloud</div>
    <p class="p">GitOps delivery for a managed Kubernetes fleet — promotion pipelines, drift detection and self-healing apps.</p>
    <div class="row">
      <span class="tech">Kubernetes</span><span class="tech">ArgoCD</span><span class="tech">Helm</span>
      <span class="hash">#gitops</span><span class="hash">#devops</span>
    </div>
    <div class="foot"><span class="handle">/projects/argocd-ovh</span><span class="open">Open</span></div>
  </div>
</div>
</body>
</html>
