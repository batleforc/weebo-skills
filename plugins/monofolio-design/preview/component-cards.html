<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:24px 28px; display:flex; gap:16px; }
  .card { flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; transition:border-color .15s ease; }
  .card.hover { border-color:oklch(0.65 0.26 25 / 0.4); }
  .panel { box-shadow:0 1px 2px rgba(0,0,0,.4); }
  .h { font-family:var(--font-sans); font-weight:700; font-size:15px; color:var(--foreground); margin:0 0 6px; }
  .p { font-family:var(--font-sans); font-size:12.5px; color:var(--muted-foreground); margin:0; line-height:1.6; }
  .tag { font-family:var(--font-mono); font-size:9px; color:var(--accent); letter-spacing:.12em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="tag">Card · default</div>
    <div class="h" style="margin-top:6px;">Translucent border</div>
    <p class="p">bg-card + 1px crimson border at 22% alpha. The border is the card.</p>
  </div>
  <div class="card hover">
    <div class="tag">Card · hover</div>
    <div class="h" style="margin-top:6px;">Border brightens</div>
    <p class="p">On hover the border lifts to primary/40 via transition-colors.</p>
  </div>
  <div class="card panel">
    <div class="tag">PanelCard</div>
    <div class="h" style="margin-top:6px;">+ soft shadow-sm</div>
    <p class="p">Softer elevation variant for grouped info panels.</p>
  </div>
</div>
</body>
</html>
