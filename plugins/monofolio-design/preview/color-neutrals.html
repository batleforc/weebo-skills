<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:22px 24px; font-family:var(--font-mono); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; height:90px; border-radius:var(--radius-lg); display:flex; flex-direction:column; justify-content:flex-end; padding:10px; box-sizing:border-box; border:1px solid var(--border); }
  .name { font-size:12px; font-weight:600; color:var(--foreground); }
  .val { font-size:9.5px; opacity:.6; color:var(--foreground); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:var(--background);"><div class="name">Background</div><div class="val">0.07 0.018 18</div></div>
    <div class="sw" style="background:var(--card);"><div class="name">Card</div><div class="val">0.10 0.018 18</div></div>
    <div class="sw" style="background:var(--secondary);"><div class="name">Secondary</div><div class="val">0.14 0.022 18</div></div>
    <div class="sw" style="background:var(--muted);"><div class="name">Muted</div><div class="val">0.13 0.016 18</div></div>
    <div class="sw" style="background:var(--foreground);"><div class="name" style="color:#111;">Foreground</div><div class="val" style="color:#111;">0.93 0.018 25</div></div>
  </div>
</div>
</body>
</html>
