<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .stage { position:relative; height:150px; background:var(--background); }
  .glow { position:absolute; inset:0; background:radial-gradient(ellipse 70% 60% at 70% 30%, oklch(0.65 0.26 25 / 0.18), transparent 70%); }
  .lbl { position:absolute; left:24px; bottom:18px; font-family:var(--font-mono); font-size:11px; color:var(--foreground); letter-spacing:.08em; }
  .lbl span { color:var(--muted-foreground); display:block; font-size:9.5px; margin-top:3px; }
</style>
</head>
<body>
<div class="stage cyber-grid-bg">
  <div class="glow"></div>
  <div class="lbl">.cyber-grid-bg + radial primary glow
    <span>48×48px crimson crosshatch (6% alpha) · the signature section background</span>
  </div>
</div>
</body>
</html>
