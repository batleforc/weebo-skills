<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:26px 28px; display:flex; align-items:center; gap:28px; }
  .logo { font-family:var(--font-mono); font-weight:700; font-size:48px; color:var(--primary); text-shadow:var(--cyber-glow); }
  .mark { width:84px; height:84px; border-radius:var(--radius-xl); border:1px solid var(--border); object-fit:contain; background:var(--card); padding:6px; box-sizing:border-box; }
  .note { color:var(--muted-foreground); font-family:var(--font-mono); font-size:10.5px; line-height:1.6; }
  .note b { color:var(--foreground); }
</style>
</head>
<body>
<div class="wrap">
  <span class="logo">Max.</span>
  <img class="mark" src="../assets/logo-mark.png" alt="mecha mascot">
  <div class="note">Primary lockup is the wordmark <b>Max.</b> (mono, crimson, glow).<br>The mecha robot is the favicon / PWA icon / avatar mascot.<br>There is no separate graphic wordmark.</div>
</div>
</body>
</html>
