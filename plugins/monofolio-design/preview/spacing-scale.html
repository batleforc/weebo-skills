<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:24px 28px; font-family:var(--font-mono); }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
  .bar { height:14px; background:var(--primary); border-radius:1px; opacity:.85; }
  .k { width:64px; font-size:10px; color:var(--foreground); }
  .v { font-size:10px; color:var(--muted-foreground); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="k">space-2</span><div class="bar" style="width:8px"></div><span class="v">0.5rem</span></div>
  <div class="row"><span class="k">space-4</span><div class="bar" style="width:16px"></div><span class="v">1rem · card gap</span></div>
  <div class="row"><span class="k">space-5</span><div class="bar" style="width:20px"></div><span class="v">1.25rem · section px</span></div>
  <div class="row"><span class="k">space-6</span><div class="bar" style="width:24px"></div><span class="v">1.5rem · card padding</span></div>
  <div class="row"><span class="k">space-16</span><div class="bar" style="width:64px"></div><span class="v">4rem · section py</span></div>
</div>
</body>
</html>
