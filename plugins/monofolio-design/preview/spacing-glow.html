<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; }
  .wrap { padding:28px; display:flex; gap:24px; align-items:center; }
  .chip { width:130px; height:74px; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; font-weight:600; }
  .note { flex:1; color:var(--muted-foreground); font-size:11px; line-height:1.6; font-family:var(--font-mono); }
  .note b { color:var(--foreground); }
</style>
</head>
<body>
<div class="wrap">
  <div class="chip" style="background:var(--card); border:1px solid var(--primary); color:var(--primary); box-shadow:var(--cyber-glow);">cyber-glow</div>
  <div class="chip" style="background:var(--card); border:1px solid var(--accent); color:var(--accent); box-shadow:var(--steam-glow);">steam-glow</div>
  <div class="note">
    Glow <b>is</b> the elevation system — not soft drop shadows.
    Reserved for titles, icon buttons, active borders &amp; the timeline rail.
    Plain cards rely on a 1px translucent border only.
  </div>
</div>
</body>
</html>
